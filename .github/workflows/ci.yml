name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          for app in \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.1.app \
            /Applications/Xcode_26.0.1.app \
            /Applications/Xcode.app; do
            if [ -x "$app/Contents/Developer/usr/bin/xcodebuild" ]; then
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Open source hygiene scan
        run: ./scripts/open-source-scan.sh

      - name: Whitespace check
        run: git diff --check

      - name: Build Helm
        run: |
          xcodebuild \
            -project Helm.xcodeproj \
            -scheme Helm \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            build
